# Profile for PostgreSQL (activate with --spring.profiles.active=postgres)
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/insighthub
    username: insighthub
    password: insighthub
    driver-class-name: org.postgresql.Driver

  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
