spring:
  application:
    name: insighthub

  # Default profile uses H2 in-memory for easy local dev
  datasource:
    url: jdbc:h2:mem:insighthub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /insighthub

# JWT Configuration
app:
  jwt:
    secret: insighthub-secret-key-change-in-production-min-256-bits-long-enough
    expiration-ms: 86400000  # 24 hours

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
